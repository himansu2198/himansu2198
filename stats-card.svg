<svg width="480" height="195" viewBox="0 0 480 195" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="480" y2="195" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#1f2235"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e56cf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="480" height="195" rx="16" fill="url(#cardGrad)" stroke="#2d2f45" stroke-width="1.5"/>

  <!-- Title -->
  <text x="22" y="34" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#a9b1d6">Himansu Sekhar Behura&apos;s GitHub Stats</text>

  <!-- Divider -->
  <line x1="22" y1="44" x2="310" y2="44" stroke="#2d2f45" stroke-width="1"/>

  <!-- Star icon + label -->
  <text x="22" y="72" font-family="'Segoe UI', sans-serif" font-size="12" fill="#e0af68">&#9733;</text>
  <text x="38" y="72" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Total Stars</text>
  <text x="38" y="90" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#cdd6f4">Earned:</text>

  <!-- Commit icon + label -->
  <text x="22" y="114" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ece6a">&#10003;</text>
  <text x="38" y="114" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Total Commits (2024)</text>

  <!-- PR icon + label -->
  <text x="22" y="136" font-family="'Segoe UI', sans-serif" font-size="11" fill="#7aa2f7">&#8635;</text>
  <text x="38" y="136" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Total PRs</text>

  <!-- Issues icon + label -->
  <text x="22" y="158" font-family="'Segoe UI', sans-serif" font-size="11" fill="#f7768e">&#9675;</text>
  <text x="38" y="158" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Total Issues</text>

  <!-- Contributions -->
  <text x="22" y="180" font-family="'Segoe UI', sans-serif" font-size="11" fill="#bb9af7">&#11044;</text>
  <text x="38" y="180" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Contributed to (last year)</text>

  <!-- Grade ring background -->
  <circle cx="390" cy="105" r="52" fill="#13141f" stroke="#2d2f45" stroke-width="1.5"/>

  <!-- Grade ring colored arc (simulate with stroke-dasharray) -->
  <circle cx="390" cy="105" r="44"
    fill="none"
    stroke="#2d2f45"
    stroke-width="8"/>
  <circle cx="390" cy="105" r="44"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="8"
    stroke-dasharray="220 277"
    stroke-dashoffset="69"
    stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- Grade letter -->
  <text x="390" y="100" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#cdd6f4">A+</text>
  <text x="390" y="120" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">RANK</text>

</svg>
